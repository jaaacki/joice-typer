name: macOS Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to release, for example v1.2.3
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-release:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
      MACOS_RELEASE_ENV_FILE: packaging/macos/release.env.local
      MACOS_NOTARYTOOL_PROFILE: joicetyper-notary

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install macOS build dependencies
        run: brew install portaudio cmake

      - name: Prepare signing keychain
        env:
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          test -n "$MACOS_DEVELOPER_ID_P12_BASE64" || { echo "fatal: missing secret MACOS_DEVELOPER_ID_P12_BASE64"; exit 1; }
          test -n "$MACOS_DEVELOPER_ID_P12_PASSWORD" || { echo "fatal: missing secret MACOS_DEVELOPER_ID_P12_PASSWORD"; exit 1; }
          KEYCHAIN_PATH="$RUNNER_TEMP/joicetyper-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$MACOS_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Configure notarytool profile
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          test -n "$MACOS_NOTARY_APPLE_ID" || { echo "fatal: missing secret MACOS_NOTARY_APPLE_ID"; exit 1; }
          test -n "$MACOS_NOTARY_TEAM_ID" || { echo "fatal: missing secret MACOS_NOTARY_TEAM_ID"; exit 1; }
          test -n "$MACOS_NOTARY_PASSWORD" || { echo "fatal: missing secret MACOS_NOTARY_PASSWORD"; exit 1; }
          xcrun notarytool store-credentials "$MACOS_NOTARYTOOL_PROFILE" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD"

      - name: Write Sparkle private key
        env:
          MACOS_SPARKLE_PRIVATE_KEY: ${{ secrets.MACOS_SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$MACOS_SPARKLE_PRIVATE_KEY" || { echo "fatal: missing secret MACOS_SPARKLE_PRIVATE_KEY"; exit 1; }
          SPARKLE_KEY_PATH="$RUNNER_TEMP/sparkle.private"
          printf '%s\n' "$MACOS_SPARKLE_PRIVATE_KEY" > "$SPARKLE_KEY_PATH"
          chmod 600 "$SPARKLE_KEY_PATH"
          echo "SPARKLE_KEY_PATH=$SPARKLE_KEY_PATH" >> "$GITHUB_ENV"

      - name: Write mac release env
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.MACOS_SPARKLE_PUBLIC_ED_KEY }}
        run: |
          test -n "$MACOS_CODESIGN_IDENTITY" || { echo "fatal: missing secret MACOS_CODESIGN_IDENTITY"; exit 1; }
          test -n "$MACOS_SPARKLE_PUBLIC_ED_KEY" || { echo "fatal: missing secret MACOS_SPARKLE_PUBLIC_ED_KEY"; exit 1; }
          cat > "$MACOS_RELEASE_ENV_FILE" <<EOF
          MACOS_CODESIGN_IDENTITY="$MACOS_CODESIGN_IDENTITY"
          MACOS_NOTARYTOOL_PROFILE="$MACOS_NOTARYTOOL_PROFILE"
          MACOS_APPCAST_URL="https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml"
          MACOS_RELEASE_DOWNLOAD_BASE_URL="https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG"
          GITHUB_REPOSITORY="${{ github.repository }}"
          MACOS_SPARKLE_PUBLIC_ED_KEY="$MACOS_SPARKLE_PUBLIC_ED_KEY"
          MACOS_SPARKLE_PRIVATE_KEY_FILE="$SPARKLE_KEY_PATH"
          MACOS_SPARKLE_DOWNLOAD_URL="https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz"
          MACOS_SPARKLE_DOWNLOAD_SHA256="50612a06038abc931f16011d7903b8326a362c1074dabccb718404ce8e585f0b"
          EOF

      - name: Preflight release readiness
        run: |
          make release-check RELEASE_TAG="$RELEASE_TAG"
          make mac-release-preflight
          make mac-notarize-preflight
          make mac-publish-preflight RELEASE_TAG="$RELEASE_TAG"

      - name: Ensure GitHub release exists
        run: |
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo "${{ github.repository }}" --verify-tag --title "$RELEASE_TAG" --generate-notes

      - name: Build notarized release artifacts
        run: make mac-release-artifacts RELEASE_TAG="$RELEASE_TAG"

      - name: Publish release artifacts
        run: make mac-publish-github-release RELEASE_TAG="$RELEASE_TAG"

      - name: Upload release artifacts for inspection
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ env.RELEASE_TAG }}
          path: build/macos-release/
