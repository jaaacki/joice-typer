# VoiceType configuration
trigger_key:
  - fn
  - shift
model_size: small
language: "en"
sample_rate: 16000
sound_feedback: true
input_device: ""  # empty = system default. Run 'voicetype --list-devices' to see options.
decode_mode: "greedy"  # "beam" for better sentence quality, "greedy" for lower latency
punctuation_mode: "conservative"  # "off", "conservative", or "opinionated"
translate: false  # true = whisper translates any spoken language to English; requires a multilingual model
